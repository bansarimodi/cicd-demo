name: CI Validation

on:

  pull_request:
    branches:
      - main

  push:
    branches:
      - 'feature/**'

jobs:

  ci:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show commit info
        run: |
          echo "Commit SHA:"
          git rev-parse HEAD

          echo "Commit message:"
          git log -1 --pretty=%B

      - name: Build Docker image (CI test)
        run: |
          docker build -t ci-test .

      - name: CI validation success
        run: echo "CI checks passed. PR ready for review."
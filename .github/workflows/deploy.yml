name: CI Validation

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ 'feature/**' ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show commit details
        run: |
          echo "Commit SHA:"
          git rev-parse HEAD
          
          echo "Commit message:"
          git log -1 --pretty=%B

      - name: Validation complete
        run: echo "CI checks passed. Ready for review."